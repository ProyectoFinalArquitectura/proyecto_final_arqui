services:
  db:
    image: postgres:16-alpine
    container_name: eventos_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: eventos_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d eventos_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: eventos_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      SECRET_KEY: supersecreto123
      JWT_SECRET_KEY: jwtsecreto456
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/eventos_db
      FLASK_APP: run.py
    command: sh -c "flask db upgrade && python run.py"
    ports:
      - "5001:5001"

  seed:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: eventos_seed
    depends_on:
      db:
        condition: service_healthy
    environment:
      SECRET_KEY: supersecreto123
      JWT_SECRET_KEY: jwtsecreto456
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/eventos_db
      FLASK_APP: run.py
    command: sh -c "flask db upgrade && python seed_admin.py && python seed_events.py"
    restart: "no"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:5001/api
    container_name: eventos_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:5001/api
    ports:
      - "3000:3000"

volumes:
  postgres_data:
